<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buds Mídia - Orçamento de Álbuns</title>
    <meta name="description" content="Simule o orçamento do seu álbum fotográfico premium Buds Mídia.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-logo">Buds Mídia</div>
        <h1 class="hero-title">Eternize<br>Sua História</h1>
        <p class="hero-subtitle">Selecione a categoria e escolha o álbum que mais combina com suas memórias.</p>
    </header>

    <nav class="category-tabs" id="categoryTabs">
        <!-- Tabs will be rendered here via JS -->
    </nav>

    <main class="catalog-container" id="catalogContainer">
        <!-- Cards will be rendered here via JS -->
    </main>

    <!-- Configurator Screen (Slides in from right) -->
    <div id="configuratorScreen" class="configurator-screen">
        <header class="config-header">
            <button class="btn-back" id="btnBack">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="configAlbumTitle">Configurar Álbum</h2>
        </header>
        
        <div class="config-body" id="configBody">
            <!-- Dynamic Config Groups go here -->
        </div>

        <div class="floating-bar visible" style="position: sticky; bottom: 0; transform: translateY(0);">
            <div class="total-area">
                <span class="total-label">Total Estimado</span>
                <span class="total-value" id="configTotalValue">R$ 0</span>
            </div>
            <button class="btn-whatsapp" id="btnConfigWhatsapp">
                WhatsApp
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div class="floating-bar" id="floatingBar">
        <div class="total-area">
            <span class="total-label">Investimento Total</span>
            <span class="total-value" id="totalValue">R$ 0</span>
        </div>
        <button class="btn-whatsapp" id="btnWhatsapp">
            Pedir
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        </button>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
